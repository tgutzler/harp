{% extends "base.html" %}

{% block title %}Profile — HARP{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Profile</h2>
</div>

<div class="grid">

  <article>
    <header><strong>Change password</strong></header>
    <form action="/profile/password" method="post">
      <label>
        Current password
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <label>
        New password
        <input type="password" name="new_password" autocomplete="new-password" required minlength="8">
      </label>
      <label>
        Confirm new password
        <input type="password" name="confirm_password" autocomplete="new-password" required minlength="8">
      </label>
      <button type="submit">Update password</button>
    </form>
  </article>


</div>
{% endblock %}
